<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Step sandbox</title>

    <script>
        (function () {
            // Detect base path from URL (e.g., /myapp/ -> "myapp")
            var pathSegments = window.location.pathname.split('/').filter(s => s);
            var basePath = pathSegments.length > 0 ? `/${pathSegments[0]}/` : '/';

            //console.log('Detected base path:', basePath);
            // Create and insert <base> tag dynamically
            var baseTag = document.createElement('base');
            baseTag.href = basePath;
            document.head.appendChild(baseTag);

            // Optional: store for later use in JS interop
            window.__blazorBasePath = basePath;
        })();
    </script>

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="StepWasmStandalone.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script src="step.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.12.0/dist/pixi.min.js"></script>
    <script src="EditorSupport.js" type="module"></script>
</head>

<body>
    <script type="module">
            import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
            mermaid.initialize({ startOnLoad: true, theme: 'dark' });
            window.mermaid = mermaid
    </script>
<script src="./GameDriver.js" type="module"></script>
<script>
    function GetUserCode() {
        //console.log("GetUserCode");
        return window.jar.toString();
    }

    function SetUserCode(source) {
        //console.log("SetUserCode: "+source);
        window.jar.updateCode(source);
    }

    function LogIt(s) {
        console.log(s);
    }

    function ScheduleMermaidRenderAndScollToEnd() {
        window.requestAnimationFrame(function () {
            mermaid.run();
            window.requestAnimationFrame(function () { window.scrollTo(0, document.body.scrollHeight); });
        });
    }

    if (typeof packageRepository === 'undefined')
        packageRepository = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);

    async function FetchPackage(packageName) {
        const packageUrl = packageRepository + packageName + ".step";
        //console.log("Package URL: "+packageUrl);
        const response = await fetch(packageUrl);
        if (!response.ok)
            return null;
        return await response.text();
    }
</script>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
